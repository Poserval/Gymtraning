<div class="exercises-detail-container">
    <div class="exercises-detail-header">
        <button id="back-to-exercises-from-triceps" class="back-btn" title="Назад">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 11H7.83L13.42 5.41L12 4L4 12L12 20L13.41 18.59L7.83 13H20V11Z" fill="white"/>
            </svg>
        </button>
        <h2>Трицепс</h2>
        <div class="detail-actions">
            <button id="add-triceps-exercise-btn" class="detail-action-btn" title="Добавить упражнение">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="white"/>
                </svg>
            </button>
            <button id="sort-triceps-btn" class="detail-action-btn" title="Сортировка">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 18h6v-2H3v2zM3 6v2h18V6H3zm0 7h12v-2H3v2z" fill="white"/>
                </svg>
            </button>
        </div>
    </div>
    <div class="exercises-detail-content">
        <div id="triceps-exercises-list" class="exercises-detail-list">
            <!-- Пример вкладки упражнения -->
            <div class="exercise-item" data-exercise="dips" data-name="Жим от брусьев" data-img="assets/exercises/triceps/icon-triceps-001.png">
                <div class="exercise-item-left">
                    <img src="assets/exercises/triceps/icon-triceps-001.png" alt="Жим от брусьев" class="exercise-image" onerror="this.src='assets/icon-desktop-192.png'">
                </div>
                <div class="exercise-item-center">
                    <span class="exercise-item-name">Жим от брусьев</span>
                </div>
                <div class="exercise-item-right">
                    <button class="exercise-favorite-btn" data-favorite="false">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12 17.27L18.18 21L16.54 13.97L22 9.24L14.81 8.63L12 2L9.19 8.63L2 9.24L7.46 13.97L5.82 21L12 17.27Z" fill="none" stroke="white" stroke-width="1.5"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <div id="empty-triceps" class="empty-exercises-detail" style="display: none;">
            <p>Нет упражнений для трицепса</p>
            <p style="margin-top: 10px; color: #888;">Нажмите + чтобы добавить упражнение</p>
        </div>
    </div>
</div>
