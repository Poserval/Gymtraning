<!-- СТРАНИЦА ВЫБОРА УПРАЖНЕНИЙ ДЛЯ ТРЕНИРОВКИ -->
<div class="exercises-detail-container">
    <div class="exercises-detail-header">
        <button id="back-to-workout-from-select" class="back-btn" title="Назад">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 11H7.83L13.42 5.41L12 4L4 12L12 20L13.41 18.59L7.83 13H20V11Z" fill="white"/>
            </svg>
        </button>
        <h2 id="select-category-title">Трицепс</h2>
        <div style="width: 40px;"></div>
    </div>
    <div class="exercises-detail-content">
        <div id="select-exercises-list" class="exercises-detail-list">
            <!-- Список упражнений для выбора -->
        </div>
        <div id="empty-select-exercises" class="empty-exercises-detail" style="display: none;">
            <p>Нет упражнений в этой группе</p>
        </div>
    </div>
    <div class="select-footer" id="select-footer" style="display: none;">
        <button id="confirm-add-exercises-btn" class="confirm-add-btn">Добавить выбранные</button>
    </div>
</div>
