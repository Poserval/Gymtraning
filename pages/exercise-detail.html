<div class="exercise-detail-container">
    <div class="exercise-detail-header">
        <button id="back-to-triceps-from-detail" class="back-btn" title="Назад">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M20 11H7.83L13.42 5.41L12 4L4 12L12 20L13.41 18.59L7.83 13H20V11Z" fill="white"/>
            </svg>
        </button>
        <h2 id="exercise-detail-name">Жим от брусьев</h2>
        <div style="width: 40px;"></div>
    </div>
    <div class="exercise-detail-content">
        <div class="exercise-detail-image">
            <img id="exercise-detail-img" src="assets/exercises/triceps/icon-triceps-001.png" alt="Жим от брусьев" onerror="this.src='assets/icon-desktop-192.png'">
        </div>
        <div class="exercise-sets-container">
            <div class="sets-header">
                <span class="sets-header-cell">Сет</span>
                <span class="sets-header-cell">Кг</span>
                <span class="sets-header-cell">Повторения</span>
                <span class="sets-header-cell">✓</span>
            </div>
            <div id="sets-list" class="sets-list">
                <!-- Сеты будут добавлены через JavaScript -->
            </div>
            <button id="add-set-btn" class="add-set-btn">+</button>
        </div>
    </div>
</div>
