<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Gym Training</title>
    
    <!-- Иконки для PWA -->
    <link rel="icon" href="assets/icon-desktop-192.png" type="image/png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icon-desktop-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icon-desktop-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="assets/icon-desktop-48.png">
    <link rel="icon" type="image/png" sizes="64x64" href="assets/icon-desktop-64.png">
    <link rel="icon" type="image/png" sizes="72x72" href="assets/icon-desktop-72.png">
    <link rel="icon" type="image/png" sizes="96x96" href="assets/icon-desktop-96.png">
    <link rel="icon" type="image/png" sizes="128x128" href="assets/icon-desktop-128.png">
    <link rel="icon" type="image/png" sizes="144x144" href="assets/icon-desktop-144.png">
    <link rel="icon" type="image/png" sizes="152x152" href="assets/icon-desktop-152.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-desktop-192.png">
    <link rel="icon" type="image/png" sizes="256x256" href="assets/icon-desktop-256.png">
    <link rel="icon" type="image/png" sizes="384x384" href="assets/icon-desktop-384.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-desktop-512.png">
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-desktop-152.png">
    
    <!-- Базовые стили (будут подгружаться динамически) -->
    <link rel="stylesheet" href="styles/base.css">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gym Training">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- ЭКРАН ЗАСТАВКИ -->
    <div id="splash-screen">
        <img id="splash-image" src="assets/icon-main.png" alt="Gym Training">
    </div>

    <!-- КОНТЕЙНЕР ДЛЯ ВСЕХ СТРАНИЦ -->
    <div id="app-root"></div>

    <!-- НИЖНЯЯ ПАНЕЛЬ НАВИГАЦИИ -->
    <div class="bottom-nav">
        <button class="nav-btn" id="nav-training" data-page="workouts">
            <img src="assets/icon-training-button.png" alt="Тренировка" class="nav-icon">
            <span class="nav-label">Тренировка</span>
        </button>
        <button class="nav-btn" id="nav-exercises" data-page="exercises-list">
            <img src="assets/icon-exercises-button.png" alt="Упражнения" class="nav-icon">
            <span class="nav-label">Упражнения</span>
        </button>
        <button class="nav-btn" id="nav-progress" data-page="progress">
            <img src="assets/icon-progress-button.png" alt="Прогресс" class="nav-icon">
            <span class="nav-label">Прогресс</span>
        </button>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО (общее) -->
    <div id="workout-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Создать тренировку</h3>
            <div class="modal-field">
                <label>Имя тренировки</label>
                <input type="text" id="workout-name" placeholder="Например: Руки и спина" maxlength="50">
            </div>
            <div class="modal-field">
                <label>День тренировки</label>
                <div class="day-selector">
                    <select id="workout-day">
                        <option value="any">Любой день</option>
                        <option value="monday">Понедельник</option>
                        <option value="tuesday">Вторник</option>
                        <option value="wednesday">Среда</option>
                        <option value="thursday">Четверг</option>
                        <option value="friday">Пятница</option>
                        <option value="saturday">Суббота</option>
                        <option value="sunday">Воскресенье</option>
                    </select>
                </div>
                <p class="hint">Выберите "Любой день", если тренировка не привязана к конкретному дню</p>
            </div>
            <div class="modal-buttons">
                <button id="cancel-workout-btn" class="modal-cancel-btn">Отмена</button>
                <button id="confirm-workout-btn" class="modal-confirm-btn">Принять</button>
            </div>
        </div>
    </div>

    <!-- МЕНЮ ДЛЯ КАРТОЧКИ -->
    <div id="workout-menu" class="workout-menu">
        <div class="workout-menu-content">
            <button id="menu-edit" class="menu-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z" fill="white"/>
                </svg>
                <span>Изменить</span>
            </button>
            <button id="menu-copy" class="menu-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z" fill="white"/>
                </svg>
                <span>Копия</span>
            </button>
            <button id="menu-delete" class="menu-item menu-delete">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" fill="white"/>
                </svg>
                <span>Удалить</span>
            </button>
        </div>
    </div>

    <!-- ПОДГРУЗКА СКРИПТОВ -->
    <script src="js/app.js"></script>
</body>
</html>
