<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <title>Gym Training</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gym Training">
</head>
<body>
    <!-- ЭКРАН ЗАСТАВКИ (полноэкранная картинка) -->
    <div id="splash-screen">
        <img id="splash-image" src="assets/icon-main.png" alt="Gym Training">
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div id="app-content" style="display: none;">
        <!-- Календарь -->
        <div class="calendar-container">
            <div class="calendar-header">
                <h2 id="current-month">Апрель 2026</h2>
            </div>
            <div class="calendar">
                <div class="calendar-weekdays">
                    <div>ПН</div>
                    <div>ВТ</div>
                    <div>СР</div>
                    <div>ЧТ</div>
                    <div>ПТ</div>
                    <div>СБ</div>
                    <div>ВС</div>
                </div>
                <div class="calendar-days" id="calendar-days">
                    <!-- Дни будут добавлены через JavaScript -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
