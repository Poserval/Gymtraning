<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <title>Gym Training</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gym Training">
</head>
<body>
    <!-- ЭКРАН ЗАСТАВКИ (полноэкранная картинка) -->
    <div id="splash-screen">
        <img id="splash-image" src="assets/icon-main.png" alt="Gym Training">
    </div>

    <!-- ОСНОВНОЙ КОНТЕНТ -->
    <div id="app-content" style="display: none;">
        <!-- Календарь -->
        <div class="calendar-wrapper">
            <div class="calendar-header">
                <h2 id="current-month">Апрель 2026</h2>
                <button id="reset-calendar-btn" class="reset-calendar-btn" title="Вернуться к текущему месяцу">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 4V2L8 6L12 10V8C15.31 8 18 10.69 18 14C18 15.01 17.75 15.97 17.3 16.8L18.76 18.26C19.54 17.03 20 15.57 20 14C20 9.58 16.42 6 12 6V4Z" fill="white"/>
                        <path d="M12 18V20L16 16L12 12V14C8.69 14 6 11.31 6 8C6 6.99 6.25 6.03 6.7 5.2L5.24 3.74C4.46 4.97 4 6.43 4 8C4 12.42 7.58 16 12 16V18Z" fill="white"/>
                    </svg>
                </button>
            </div>
            <div class="calendar-window">
                <div class="calendar-scroll-container" id="calendar-scroll">
                    <div class="calendar-months" id="calendar-months">
                        <!-- Месяцы будут добавлены через JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
