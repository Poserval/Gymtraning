<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <title>Gym Training</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gym Training">
</head>
<body>
    <!-- ЭКРАН ЗАСТАВКИ (полноэкранная картинка) -->
    <div id="splash-screen">
        <img id="splash-image" src="assets/icon-main.png" alt="Gym Training">
    </div>

    <!-- СТРАНИЦА 1: КАЛЕНДАРЬ -->
    <div id="page-calendar" class="page" style="display: none;">
        <div class="calendar-wrapper">
            <div class="calendar-header">
                <h2 id="current-month">Апрель 2026</h2>
                <button id="reset-calendar-btn" class="reset-calendar-btn" title="Вернуться к текущему месяцу">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 4V2L8 6L12 10V8C15.31 8 18 10.69 18 14C18 15.01 17.75 15.97 17.3 16.8L18.76 18.26C19.54 17.03 20 15.57 20 14C20 9.58 16.42 6 12 6V4Z" fill="white"/>
                        <path d="M12 18V20L16 16L12 12V14C8.69 14 6 11.31 6 8C6 6.99 6.25 6.03 6.7 5.2L5.24 3.74C4.46 4.97 4 6.43 4 8C4 12.42 7.58 16 12 16V18Z" fill="white"/>
                    </svg>
                </button>
            </div>
            <div class="calendar-window" id="calendar-window">
                <div class="calendar-scroll-container" id="calendar-scroll">
                    <div class="calendar-months" id="calendar-months">
                        <!-- Месяцы будут добавлены через JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- СТРАНИЦА 2: ТРЕНИРОВКА -->
    <div id="page-workout" class="page" style="display: none;">
        <div class="workout-container">
            <div class="workout-header">
                <button id="back-to-calendar-btn" class="back-btn" title="Назад">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 11H7.83L13.42 5.41L12 4L4 12L12 20L13.41 18.59L7.83 13H20V11Z" fill="white"/>
                    </svg>
                </button>
                <h2 id="workout-date-title">Создай тренировку</h2>
                <button id="add-workout-btn" class="add-workout-btn" title="Добавить тренировку">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="white"/>
                    </svg>
                </button>
            </div>
            <div class="workout-content">
                <div id="workouts-list" class="workouts-list">
                    <!-- Список тренировок будет здесь -->
                </div>
                <div id="empty-workouts" class="workout-placeholder">
                    <p>Нет созданных тренировок</p>
                    <p style="margin-top: 20px; color: #888;">Нажмите + чтобы создать тренировку</p>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ДЛЯ СОЗДАНИЯ ТРЕНИРОВКИ -->
    <div id="workout-modal" class="modal">
        <div class="modal-content">
            <h3>Создать тренировку</h3>
            
            <div class="modal-field">
                <label>Имя тренировки</label>
                <input type="text" id="workout-name" placeholder="Например: Руки и спина" maxlength="50">
            </div>
            
            <div class="modal-field">
                <label>День тренировки</label>
                <div class="day-selector">
                    <select id="workout-day">
                        <option value="any">Любой день</option>
                        <option value="monday">Понедельник</option>
                        <option value="tuesday">Вторник</option>
                        <option value="wednesday">Среда</option>
                        <option value="thursday">Четверг</option>
                        <option value="friday">Пятница</option>
                        <option value="saturday">Суббота</option>
                        <option value="sunday">Воскресенье</option>
                    </select>
                </div>
                <p class="hint">Выберите "Любой день", если тренировка не привязана к конкретному дню</p>
            </div>
            
            <div class="modal-buttons">
                <button id="cancel-workout-btn" class="modal-cancel-btn">Отмена</button>
                <button id="confirm-workout-btn" class="modal-confirm-btn">Принять</button>
            </div>
        </div>
    </div>

    <!-- НИЖНЯЯ ПАНЕЛЬ НАВИГАЦИИ (BOTTOM BAR) -->
    <div class="bottom-nav">
        <button class="nav-btn" id="nav-training" data-page="workout">
            <img src="assets/icon-training-button.png" alt="Тренировка" class="nav-icon">
            <span class="nav-label">Тренировка</span>
        </button>
        <button class="nav-btn" id="nav-exercises" data-page="exercises">
            <img src="assets/icon-exercises-button.png" alt="Упражнения" class="nav-icon">
            <span class="nav-label">Упражнения</span>
        </button>
        <button class="nav-btn" id="nav-progress" data-page="progress">
            <img src="assets/icon-progress-button.png" alt="Прогресс" class="nav-icon">
            <span class="nav-label">Прогресс</span>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
