<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Gym Training</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/exercise-card.css">
    <link rel="manifest" href="manifest.json">
    
    <!-- Иконки -->
    <link rel="icon" href="assets/icon-desktop-192.png" type="image/png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icon-desktop-16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icon-desktop-32.png">
    <link rel="icon" type="image/png" sizes="48x48" href="assets/icon-desktop-48.png">
    <link rel="icon" type="image/png" sizes="64x64" href="assets/icon-desktop-64.png">
    <link rel="icon" type="image/png" sizes="72x72" href="assets/icon-desktop-72.png">
    <link rel="icon" type="image/png" sizes="96x96" href="assets/icon-desktop-96.png">
    <link rel="icon" type="image/png" sizes="128x128" href="assets/icon-desktop-128.png">
    <link rel="icon" type="image/png" sizes="144x144" href="assets/icon-desktop-144.png">
    <link rel="icon" type="image/png" sizes="152x152" href="assets/icon-desktop-152.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-desktop-192.png">
    <link rel="icon" type="image/png" sizes="256x256" href="assets/icon-desktop-256.png">
    <link rel="icon" type="image/png" sizes="384x384" href="assets/icon-desktop-384.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/icon-desktop-512.png">
    
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icon-desktop-152.png">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Gym Training">
</head>
<body>
    <!-- ЭКРАН ЗАСТАВКИ -->
    <div id="splash-screen">
        <img id="splash-image" src="assets/icon-main.png" alt="Gym Training">
    </div>

    <!-- СТРАНИЦА 1: КАЛЕНДАРЬ -->
    <div id="page-calendar" class="page" style="display: none;">
        <div class="calendar-wrapper">
            <div class="calendar-header">
                <h2 id="current-month">Апрель 2026</h2>
                <button id="reset-calendar-btn" class="reset-calendar-btn" title="Вернуться к текущему месяцу">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 4V2L8 6L12 10V8C15.31 8 18 10.69 18 14C18 15.01 17.75 15.97 17.3 16.8L18.76 18.26C19.54 17.03 20 15.57 20 14C20 9.58 16.42 6 12 6V4Z" fill="white"/>
                        <path d="M12 18V20L16 16L12 12V14C8.69 14 6 11.31 6 8C6 6.99 6.25 6.03 6.7 5.2L5.24 3.74C4.46 4.97 4 6.43 4 8C4 12.42 7.58 16 12 16V18Z" fill="white"/>
                    </svg>
                </button>
            </div>
            <div class="calendar-window" id="calendar-window">
                <div class="calendar-scroll-container" id="calendar-scroll">
                    <div class="calendar-months" id="calendar-months">
                        <!-- Месяцы будут добавлены через JavaScript -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- СТРАНИЦА 2: СПИСОК ТРЕНИРОВОК (загружается из pages/workout-list.html) -->
    <div id="page-workout" class="page" style="display: none;"></div>

    <!-- СТРАНИЦА 3: ДЕТАЛИ ТРЕНИРОВКИ -->
    <div id="page-workout-detail" class="page" style="display: none;">
        <div class="detail-container">
            <div class="detail-header">
                <button id="back-to-workout-list-btn" class="back-btn" title="Назад">
                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M20 11H7.83L13.42 5.41L12 4L4 12L12 20L13.41 18.59L7.83 13H20V11Z" fill="white"/>
                    </svg>
                </button>
                <div class="detail-header-info">
                    <span class="detail-day-badge" id="detail-day-badge">Пн</span>
                    <h2 id="detail-workout-name">Спина</h2>
                </div>
                <div style="width: 40px;"></div>
            </div>
            <div class="detail-content">
                <button id="add-exercise-btn" class="add-exercise-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z" fill="#ff9800"/>
                    </svg>
                    <span>Выбери упражнение</span>
                </button>
                <div id="exercises-list" class="exercises-list">
                    <!-- Список упражнений будет здесь -->
                </div>
                <div id="empty-exercises" class="empty-exercises">
                    <p>Нет добавленных упражнений</p>
                    <p style="margin-top: 10px; color: #888;">Нажмите "Выбери упражнение" чтобы добавить</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ОСТАЛЬНЫЕ СТРАНИЦЫ (УПРАЖНЕНИЯ, ГРУППЫ, ДЕТАЛИ) -->
    <div id="page-exercises" class="page" style="display: none;"></div>
    <div id="page-triceps" class="page" style="display: none;">...</div>
    <div id="page-exercise-detail" class="page" style="display: none;">...</div>
    <div id="page-chest" class="page" style="display: none;">...</div>
    <div id="page-shoulder" class="page" style="display: none;">...</div>
    <div id="page-biceps" class="page" style="display: none;">...</div>
    <div id="page-abs" class="page" style="display: none;">...</div>
    <div id="page-back" class="page" style="display: none;">...</div>
    <div id="page-forearms" class="page" style="display: none;">...</div>
    <div id="page-upperlegs" class="page" style="display: none;">...</div>
    <div id="page-glutes" class="page" style="display: none;">...</div>
    <div id="page-cardio" class="page" style="display: none;">...</div>
    <div id="page-lowerlegs" class="page" style="display: none;">...</div>

    <!-- МОДАЛЬНЫЕ ОКНА И МЕНЮ -->
    <div id="workout-modal" class="modal">...</div>
    <div id="exercise-modal" class="modal">...</div>
    <div id="workout-menu" class="workout-menu">...</div>
    <div id="exercise-menu" class="workout-menu">...</div>

    <!-- НИЖНЯЯ ПАНЕЛЬ -->
    <div class="bottom-nav">
        <button class="nav-btn" id="nav-training" data-page="workout">
            <img src="assets/icon-training-button.png" alt="Тренировка" class="nav-icon">
            <span class="nav-label">Тренировка</span>
        </button>
        <button class="nav-btn" id="nav-exercises" data-page="exercises">
            <img src="assets/icon-exercises-button.png" alt="Упражнения" class="nav-icon">
            <span class="nav-label">Упражнения</span>
        </button>
        <button class="nav-btn" id="nav-progress" data-page="progress">
            <img src="assets/icon-progress-button.png" alt="Прогресс" class="nav-icon">
            <span class="nav-label">Прогресс</span>
        </button>
    </div>

    <script src="script.js"></script>
    <script src="js/exercise-card.js"></script>
</body>
</html>
